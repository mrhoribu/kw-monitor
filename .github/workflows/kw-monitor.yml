name: Kennedy-Warren monitor

on:
  workflow_dispatch:
#  schedule:
#    - cron: '23,53 * * * *'   # every 30mins

permissions:
  contents: write   # needed to commit state.json back

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - run: pip install requests beautifulsoup4

      - id: check
        env:
          WATCH_LIST: 'Historic 03,Historic 05'   # comma-separate for multiple
        run: python monitor.py

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: debug-response
          path: debug/
          retention-days: 1

      - if: steps.check.outputs.hit == 'true'
        name: Discord notify
        continue-on-error: true
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MATCHES: ${{ steps.check.outputs.matches }}
          ALL: ${{ steps.check.outputs.all_matching }}
        run: |
          curl --fail-with-body -H "Content-Type: application/json" -X POST "$WEBHOOK" -d @- <<EOF
          {
            "username": "Kennedy-Warren Monitor",
            "embeds": [{
              "title": "🏠 New availability: $MATCHES",
              "url": "https://kennedywarren.com/floorplans/",
              "color": 3066993,
              "fields": [
                {"name": "Newly available", "value": "$MATCHES", "inline": false},
                {"name": "All currently matching", "value": "${ALL:-none}", "inline": false}
              ],
              "footer": {"text": "Run ${{ github.run_id }}"}
            }]
          }
          EOF

      - if: steps.check.outputs.hit == 'true'
        name: Resend email notify
        continue-on-error: true
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_FROM: ${{ secrets.RESEND_FROM }}      # "KW Monitor <monitor@yourdomain.com>"
          MAIL_TO: ${{ secrets.RESEND_TO }}          # your.email@example.com
          MATCHES: ${{ steps.check.outputs.matches }}
          ALL: ${{ steps.check.outputs.all_matching }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl --fail-with-body -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "from": "$MAIL_FROM",
            "to": ["$MAIL_TO"],
            "subject": "🏠 Kennedy-Warren: $MATCHES available",
            "html": "<h2>New floorplan availability</h2><p><strong>Newly available:</strong> $MATCHES</p><p><strong>All currently matching:</strong> ${ALL:-none}</p><p><a href=\"https://kennedywarren.com/floorplans/\">View floorplans</a> · <a href=\"$RUN_URL\">Workflow run</a></p>"
          }
          EOF

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "state: update floorplan availability"
          file_pattern: state.json
