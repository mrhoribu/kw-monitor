name: Kennedy-Warren monitor

on:
  workflow_dispatch:
#  schedule:
#    - cron: '0 */4 * * *'   # every 4 hours

permissions:
  contents: write   # needed to commit state.json back

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - run: pip install requests beautifulsoup4

      - id: check
        env:
          WATCH_LIST: 'Historic 03,Historic 05'   # comma-separate for multiple
        run: python monitor.py

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: debug-response
          path: debug/
          retention-days: 1

      - if: steps.check.outputs.hit == 'true'
        name: Discord notify
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MATCHES: ${{ steps.check.outputs.matches }}
          ALL: ${{ steps.check.outputs.all_matching }}
        run: |
          curl -H "Content-Type: application/json" -X POST "$WEBHOOK" -d @- <<EOF
          {
            "username": "Kennedy-Warren Monitor",
            "embeds": [{
              "title": "🏠 New availability: $MATCHES",
              "url": "https://kennedywarren.com/floorplans/",
              "color": 3066993,
              "fields": [
                {"name": "Newly available", "value": "$MATCHES", "inline": false},
                {"name": "All currently matching", "value": "${ALL:-none}", "inline": false}
              ],
              "footer": {"text": "Run ${{ github.run_id }}"}
            }]
          }
          EOF

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "state: update floorplan availability"
          file_pattern: state.json
